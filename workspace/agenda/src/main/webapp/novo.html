<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>Criar novo contato</title>
    <link rel="shortcut icon" href="img/contato.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container text-bg-warning text-center py-3">
        <h1 class="text-primary text-dark">Criar novo contato</h1>
        
        
                <form class="row g-3 w-50 mx-auto" name="frmContato" action="insert">

            <div class="mb-3">
                <input type="text" name="nome" class="form-control" placeholder="Seu nome" aria-label="Seu nome"
                    aria-describedby="Digite seu nome" required>
            </div>

            <div class="mb-3">
                <input type="text" name="fone" class="form-control" placeholder="Telefone" aria-label="Telefone"
                    aria-describedby="Digite seu telefone" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="E-mail" aria-label="E-mail"
                    aria-describedby="Digite seu e-mail" required>
            </div>

        </form>
        
        

        <button class="btn btn-primary" onclick="validar()">Adicionar</button>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    
    <script src="scripts/validador.js"></script>
    
</body>

</html>
